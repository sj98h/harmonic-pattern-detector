<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#00d4ff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Harmonic">
<link rel="manifest" href="./manifest.json">
<link rel="icon" type="image/png" sizes="32x32" href="./icon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="./icon-16.png">
<link rel="shortcut icon" href="./favicon.ico">
<link rel="apple-touch-icon" href="./icon-192.png">
<title>하모닉 패턴 감지기</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#080c12; --surface:#0e1520; --surface2:#131e2e; --border:#1e2d42;
  --accent:#00d4ff; --accent2:#ff6b35; --green:#00e676;
  --text:#c8d8e8; --dim:#4a6080; --dim2:#6a8aaa;
  --safe-top:env(safe-area-inset-top); --safe-bot:env(safe-area-inset-bottom);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;padding:calc(24px + var(--safe-top)) 16px calc(40px + var(--safe-bot));overscroll-behavior:none}
body::before{content:'';position:fixed;inset:0;z-index:-1;background-image:linear-gradient(rgba(0,212,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.025) 1px,transparent 1px);background-size:36px 36px}
header{text-align:center;margin-bottom:28px}
header h1{font-family:'Space Mono',monospace;font-size:clamp(16px,4.5vw,28px);color:var(--accent);letter-spacing:2px;text-shadow:0 0 24px rgba(0,212,255,.5)}
header p{color:var(--dim);font-size:11px;margin-top:5px;letter-spacing:2px;text-transform:uppercase}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;max-width:720px;margin:0 auto 20px}
.card-title{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:3px;color:var(--accent);text-transform:uppercase;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.input-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
@media(min-width:480px){.input-grid{grid-template-columns:repeat(4,1fr)}}
.input-group label{display:block;font-family:'Space Mono',monospace;font-size:11px;color:var(--dim2);letter-spacing:2px;margin-bottom:6px}
.input-group input{width:100%;background:#080f1a;border:1px solid var(--border);border-radius:8px;color:var(--accent);font-family:'Space Mono',monospace;font-size:20px;padding:10px 12px;outline:none;transition:border-color .2s,box-shadow .2s}
.input-group input:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(0,212,255,.12)}
.input-group input::placeholder{color:#2a3d55;font-size:14px}
.tolerance-row{display:flex;align-items:center;gap:12px;margin-top:16px;padding-top:14px;border-top:1px solid var(--border)}
.tolerance-row label{font-family:'Space Mono',monospace;font-size:11px;color:var(--dim2);letter-spacing:1px;white-space:nowrap}
input[type=range]{flex:1;-webkit-appearance:none;height:3px;border-radius:2px;background:var(--border);outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--accent);cursor:pointer;box-shadow:0 0 8px rgba(0,212,255,.5)}
#tolDisplay{font-family:'Space Mono',monospace;font-size:13px;color:var(--accent);min-width:42px;text-align:right}

/* 초기화 버튼 */
.clear-btn{background:none;border:1px solid var(--border);border-radius:6px;color:var(--dim2);font-family:'Space Mono',monospace;font-size:10px;letter-spacing:1px;padding:4px 10px;cursor:pointer;transition:all .2s}
.clear-btn:hover{border-color:var(--accent2);color:var(--accent2)}

/* 카테고리 필터 탭 */
.cat-tabs{display:flex;gap:6px;flex-wrap:wrap;max-width:720px;margin:0 auto 12px}
.cat-tab{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:1px;padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--dim2);cursor:pointer;transition:all .2s;white-space:nowrap}
.cat-tab:hover{border-color:var(--dim2)}
.cat-tab.active{border-color:var(--accent);color:var(--accent);background:rgba(0,212,255,.08)}
.cat-tab[data-cat="근본"].active   {border-color:#4a9fff;color:#4a9fff;background:rgba(42,127,255,.1)}
.cat-tab[data-cat="근본+"].active  {border-color:#00c896;color:#00c896;background:rgba(0,200,150,.1)}
.cat-tab[data-cat="사파"].active   {border-color:#f0a500;color:#f0a500;background:rgba(240,165,0,.1)}
.cat-tab[data-cat="반전형"].active {border-color:#e040fb;color:#e040fb;background:rgba(224,64,251,.1)}
.cat-tab[data-cat="짬통"].active   {border-color:#90a4ae;color:#90a4ae;background:rgba(120,144,156,.1)}

/* 매칭만 보기 토글 */
.toggle-row{display:flex;align-items:center;gap:10px;max-width:720px;margin:0 auto 16px;justify-content:flex-end}
.toggle-label{font-family:'Space Mono',monospace;font-size:11px;color:var(--dim2);letter-spacing:1px;cursor:pointer}
.toggle{position:relative;width:40px;height:22px;cursor:pointer}
.toggle input{opacity:0;width:0;height:0}
.toggle-track{position:absolute;inset:0;background:var(--border);border-radius:11px;transition:background .2s}
.toggle input:checked + .toggle-track{background:var(--green)}
.toggle-thumb{position:absolute;top:3px;left:3px;width:16px;height:16px;background:#fff;border-radius:50%;transition:transform .2s;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.toggle input:checked ~ .toggle-thumb{transform:translateX(18px)}

.btn{display:block;width:100%;max-width:720px;margin:0 auto 20px;padding:15px;background:transparent;border:1px solid var(--accent);border-radius:10px;color:var(--accent);font-family:'Space Mono',monospace;font-size:13px;letter-spacing:3px;cursor:pointer;transition:background .2s,box-shadow .2s,transform .1s;text-transform:uppercase}
.btn:hover{background:rgba(0,212,255,.07);box-shadow:0 0 20px rgba(0,212,255,.2)}
.btn:active{transform:scale(0.98)}

.search-wrap{max-width:720px;margin:0 auto 12px;position:relative}
.search-wrap input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:15px;padding:12px 44px 12px 16px;outline:none;transition:border-color .2s,box-shadow .2s}
.search-wrap input:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(0,212,255,.1)}
.search-wrap input::placeholder{color:var(--dim)}
.search-clear{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--dim);font-size:18px;cursor:pointer;display:none;line-height:1;padding:4px}

#results{max-width:720px;margin:0 auto}
.summary{font-family:'Space Mono',monospace;font-size:11px;color:var(--dim2);letter-spacing:2px;margin-bottom:10px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:8px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px}
.summary span{color:var(--accent);font-weight:700}
.summary .hint{font-size:10px;color:var(--dim)}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;min-width:560px;border-collapse:collapse;font-size:13px}
th{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--dim2);text-align:center;padding:11px 12px;border-bottom:1px solid var(--border);background:var(--surface2);white-space:nowrap;position:sticky;top:0}
th:nth-child(2){text-align:left}
td{padding:10px 12px;border-bottom:1px solid rgba(30,45,66,.5);text-align:center;vertical-align:middle}
td:nth-child(2){text-align:left}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(0,212,255,.03)}
tr.matched td{background:rgba(0,230,118,.04)}
tr.matched td:nth-child(2){border-left:2px solid var(--green);padding-left:10px}
.cat{display:inline-block;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:1px;padding:3px 8px;border-radius:4px;font-weight:700;white-space:nowrap}
.cat-근본  {background:rgba(42,127,255,.14);color:#4a9fff;border:1px solid rgba(42,127,255,.3)}
.cat-근본p {background:rgba(0,200,150,.14);color:#00c896;border:1px solid rgba(0,200,150,.3)}
.cat-사파  {background:rgba(240,165,0,.14);color:#f0a500;border:1px solid rgba(240,165,0,.3)}
.cat-반전형{background:rgba(224,64,251,.14);color:#e040fb;border:1px solid rgba(224,64,251,.3)}
.cat-짬통  {background:rgba(120,144,156,.14);color:#90a4ae;border:1px solid rgba(120,144,156,.3)}
.pname{font-weight:700;color:#ddeeff;font-size:13px}
.cbadge{display:inline-block;font-size:10px;padding:1px 6px;border-radius:3px;margin-left:5px;vertical-align:middle}
.c수렴형{background:rgba(0,212,255,.1);color:var(--accent)}
.c확장형{background:rgba(255,107,53,.1);color:var(--accent2)}
.rc{font-family:'Space Mono',monospace;font-size:11px;white-space:nowrap}
.rc.hit{color:var(--green);font-weight:700;font-size:12px}
.rc.unused{color:var(--dim2)}
footer {
  max-width:720px; margin:40px auto 0;
  border-top:1px solid var(--border); padding-top:24px;
}
.footer-inner { text-align:center; }
.footer-title {
  font-family:'Space Mono',monospace; font-size:11px;
  letter-spacing:3px; color:var(--accent); margin-bottom:8px;
}
.footer-desc { font-size:12px; color:var(--dim); margin-bottom:14px; }
.footer-addr {
  display:inline-flex; align-items:center; gap:8px;
  background:var(--surface); border:1px solid var(--border);
  border-radius:8px; padding:10px 16px; cursor:pointer;
  transition:border-color .2s;
  max-width:100%; overflow:hidden;
}
.footer-addr:hover { border-color:var(--accent); }
.footer-addr span#addrText {
  font-family:'Space Mono',monospace; font-size:11px;
  color:var(--dim2); word-break:break-all; text-align:left;
}
.copy-icon { font-size:16px; color:var(--accent); flex-shrink:0; }
.copy-msg {
  display:block; font-family:'Space Mono',monospace;
  font-size:10px; color:var(--green); letter-spacing:2px;
  margin-top:8px; min-height:16px;
}

mark{background:rgba(0,212,255,.2);color:var(--accent);border-radius:2px;padding:0 1px}
.fade{animation:fadeUp .25s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
#installBanner{display:none;position:fixed;bottom:calc(16px + var(--safe-bot));left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--accent);border-radius:12px;padding:12px 20px;font-size:13px;color:var(--text);align-items:center;gap:12px;box-shadow:0 4px 24px rgba(0,212,255,.2);z-index:100;max-width:340px;width:calc(100% - 32px)}
#installBanner button{background:var(--accent);color:#000;border:none;border-radius:6px;padding:6px 14px;font-family:'Space Mono',monospace;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap}
#installBanner .close{background:transparent;color:var(--dim);border:none;font-size:16px;cursor:pointer;padding:0 4px;margin-left:auto}
</style>
</head>
<body>

<header>
  <h1>◈ HARMONIC DETECTOR</h1>
  <p>Fibonacci Pattern Recognition</p>
</header>

<div class="card">
  <div class="card-title">
    <span>▸ 피보나치 비율 입력 <span style="color:var(--dim);font-size:9px">— 빈칸은 무시됩니다</span></span>
    <button class="clear-btn" onclick="clearInputs()">✕ 초기화</button>
  </div>
  <div class="input-grid">
    <div class="input-group"><label>XB RATIO</label><input type="text" inputmode="decimal" id="xb" placeholder="0.618" step="0.001" min="0" inputmode="decimal"></div>
    <div class="input-group"><label>AC RATIO</label><input type="text" inputmode="decimal" id="ac" placeholder="1.272" step="0.001" min="0" inputmode="decimal"></div>
    <div class="input-group"><label>BD RATIO</label><input type="text" inputmode="decimal" id="bd" placeholder="1.618" step="0.001" min="0" inputmode="decimal"></div>
    <div class="input-group"><label>XD RATIO</label><input type="text" inputmode="decimal" id="xd" placeholder="0.786" step="0.001" min="0" inputmode="decimal"></div>
  </div>
  <div style="font-family:'Space Mono',monospace;font-size:11px;margin-top:12px;min-height:16px" id="loadStatus"></div>
  <div class="tolerance-row">
    <label>오차범위</label>
    <input type="range" id="tolSlider" min="0" max="10" value="2" step="0.5">
    <span id="tolDisplay">2.0%</span>
  </div>
</div>

<!-- 검색창 + 새로고침 버튼 -->
<div style="display:flex;gap:8px;max-width:720px;margin:0 auto 12px;align-items:center">
  <div class="search-wrap" style="margin:0;flex:1">
    <input type="search" id="searchInput" placeholder="패턴명 또는 카테고리 검색..." oninput="onSearch(this.value)">
    <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
  </div>
  <button class="btn" style="margin:0;width:48px;height:48px;letter-spacing:0;font-size:20px;flex-shrink:0;padding:0" onclick="hardReload()" title="데이터 새로고침">↺</button>
</div>

<!-- 카테고리 필터 탭 (동적 생성) -->
<div class="cat-tabs" id="catTabs"></div>

<!-- 매칭만 보기 토글 -->
<div class="toggle-row">
  <label class="toggle-label" for="matchToggle">매칭만 보기</label>
  <label class="toggle">
    <input type="checkbox" id="matchToggle" onchange="renderTable()">
    <div class="toggle-track"></div>
    <div class="toggle-thumb"></div>
  </label>
</div>

<div id="results"></div>

<!-- 푸터 -->
<footer>
  <div class="footer-inner">
    <p class="footer-title">☕ Support</p>
    <p class="footer-desc">이 도구가 유용하셨다면 비트코인으로 후원해주세요</p>
    <div class="footer-addr" onclick="copyAddr()" title="클릭하여 복사">
      <span id="addrText">bc1ppf0u3aevdf2gqnuthwt9c6wgphem2lugg4a5m57egxnan4v3x9hskpfmur</span>
      <span class="copy-icon">⎘</span>
    </div>
    <span id="copyMsg" class="copy-msg"></span>
  </div>
</footer>

<div id="installBanner">
  <span>홈 화면에 앱으로 추가할 수 있어요</span>
  <button id="installBtn">설치</button>
  <button class="close" onclick="document.getElementById('installBanner').style.display='none'">✕</button>
</div>

<script>
const SHEET_ID  = '11jdxbyuDRrz2Lx50BGmvZJiv1BBR8Fdlg60L71b1JZE';
const SHEET_GID = '1831499660';
const CSV_URL   = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${SHEET_GID}`;
const CAT_MAP   = {"근본":"근본","근본+":"근본p","사파":"사파","반전형":"반전형","짬통":"짬통"};

let PATTERNS = [];
let currentSearch = '';
let currentCat = 'ALL';

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const out = []; let curCat = '';
  lines.slice(1).forEach(line => {
    const cols = line.split(',').map(c => c.trim().replace(/^"|"$/g,''));
    if (cols.length < 10) return;
    const [cat,name,minXB,maxXB,minAC,maxAC,minBD,maxBD,minXD,maxXD,comment=''] = cols;
    if (cat) curCat = cat;
    if (!name) return;
    out.push([curCat,name,+minXB,+maxXB,+minAC,+maxAC,+minBD,+maxBD,+minXD,+maxXD,comment]);
  });
  return out;
}

async function loadPatterns() {
  const st = document.getElementById('loadStatus');
  try {
    st.textContent = '⟳ 로딩 중...'; st.style.color = 'var(--dim)';
    const res = await fetch(CSV_URL);
    if (!res.ok) throw new Error();
    PATTERNS = parseCSV(await res.text());
    localStorage.setItem('harmonic_patterns', JSON.stringify(PATTERNS));
    st.textContent = `✓ ${PATTERNS.length}개 패턴 로드 완료`;
    st.style.color = 'var(--green)';
    setTimeout(() => st.textContent = '', 3000);
  } catch {
    const cached = localStorage.getItem('harmonic_patterns');
    if (cached) {
      PATTERNS = JSON.parse(cached);
      st.textContent = `📦 오프라인 캐시 (${PATTERNS.length}개)`;
      st.style.color = 'var(--accent2)';
    } else {
      st.textContent = '⚠ 로드 실패 — SHEET_ID 확인';
      st.style.color = 'var(--accent2)';
    }
  }
  buildCatTabs();
  renderTable();
}

function buildCatTabs() {
  const cats = ['ALL', ...new Set(PATTERNS.map(p => p[0]).filter(Boolean))];
  const tabsEl = document.getElementById('catTabs');
  tabsEl.innerHTML = cats.map(cat =>
    `<button class="cat-tab${cat==='ALL'?' active':''}" data-cat="${cat}" onclick="setCat('${cat}')">${cat}</button>`
  ).join('');
}

async function hardReload() {
  const btn = document.querySelector('[onclick="hardReload()"]');
  btn.style.opacity = '0.4'; btn.style.pointerEvents = 'none';
  if ('caches' in window) {
    const keys = await caches.keys();
    await Promise.all(keys.map(k => caches.delete(k)));
  }
  await loadPatterns();
  btn.style.opacity = '1'; btn.style.pointerEvents = 'auto';
}

function clearInputs() {
  ['xb','ac','bd','xd'].forEach(id => document.getElementById(id).value = '');
  renderTable();
}

function setCat(cat) {
  currentCat = cat;
  document.querySelectorAll('.cat-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.cat === cat);
  });
  // 매칭만 보기 토글 — 카테고리 바꾸면 off
  document.getElementById('matchToggle').checked = false;
  renderTable();
}

function onSearch(val) {
  currentSearch = val.trim();
  document.getElementById('searchClear').style.display = currentSearch ? 'block' : 'none';
  renderTable();
}
function clearSearch() {
  document.getElementById('searchInput').value = '';
  onSearch('');
}

const slider = document.getElementById('tolSlider');
slider.addEventListener('input', () => {
  document.getElementById('tolDisplay').textContent = parseFloat(slider.value).toFixed(1) + '%';
  renderTable();
});
document.querySelectorAll('input[type=number]').forEach(el => {
  el.addEventListener('input', renderTable);
  el.addEventListener('keydown', e => { if(e.key==='Enter') renderTable(); });
});

function hl(text, q) {
  if (!q) return text;
  return text.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'), '<mark>$1</mark>');
}
function rt(a, b) { return a === b ? String(a) : `${a} ~ ${b}`; }

function renderTable() {
  if (!PATTERNS.length) return;
  const tol = parseFloat(slider.value) / 100;
  const xb = parseFloat(document.getElementById('xb').value);
  const ac = parseFloat(document.getElementById('ac').value);
  const bd = parseFloat(document.getElementById('bd').value);
  const xd = parseFloat(document.getElementById('xd').value);
  const hXB=!isNaN(xb)&&xb>0, hAC=!isNaN(ac)&&ac>0,
        hBD=!isNaN(bd)&&bd>0, hXD=!isNaN(xd)&&xd>0;
  const anyInput = hXB||hAC||hBD||hXD;
  const q = currentSearch.toLowerCase();
  const matchOnly = document.getElementById('matchToggle').checked;

  function isMatch(p) {
    if (!anyInput) return false;
    const [,,mnXB,mxXB,mnAC,mxAC,mnBD,mxBD,mnXD,mxXD] = p;
    if (hXB && !(xb>=mnXB*(1-tol)&&xb<=mxXB*(1+tol))) return false;
    if (hAC && !(ac>=mnAC*(1-tol)&&ac<=mxAC*(1+tol))) return false;
    if (hBD && !(bd>=mnBD*(1-tol)&&bd<=mxBD*(1+tol))) return false;
    if (hXD && !(xd>=mnXD*(1-tol)&&xd<=mxXD*(1+tol))) return false;
    return true;
  }

  let filtered = PATTERNS;
  // 카테고리 필터
  if (currentCat !== 'ALL') filtered = filtered.filter(p => p[0] === currentCat);
  // 검색 필터
  if (q) filtered = filtered.filter(p => p[0].toLowerCase().includes(q) || p[1].toLowerCase().includes(q));
  // 매칭만 보기
  if (matchOnly && anyInput) filtered = filtered.filter(isMatch);

  // 매칭된 것 위로 정렬
  const sorted = anyInput && !matchOnly
    ? [...filtered].sort((a,b) => isMatch(b) - isMatch(a))
    : filtered;

  const matchCount = anyInput ? sorted.filter(isMatch).length : 0;

  const el = document.getElementById('results');
  if (!sorted.length) {
    el.innerHTML = `<div style="text-align:center;padding:36px;color:var(--dim);font-family:'Space Mono',monospace;font-size:13px;letter-spacing:2px">${matchOnly ? '매칭된 패턴 없음' : '검색 결과 없음'}</div>`;
    return;
  }

  const rows = sorted.map(p => {
    const [cat,name,mnXB,mxXB,mnAC,mxAC,mnBD,mxBD,mnXD,mxXD,comment] = p;
    const matched = isMatch(p);
    const ck = CAT_MAP[cat]||'';
    const catB = cat ? `<span class="cat cat-${ck}">${hl(cat,q)}</span>` : '';
    const comB = comment ? `<span class="cbadge c${comment}">${comment}</span>` : '';
    const tds = [
      [mnXB,mxXB,hXB,xb],[mnAC,mxAC,hAC,ac],[mnBD,mxBD,hBD,bd],[mnXD,mxXD,hXD,xd]
    ].map(([mn,mx,has,val]) => {
      const hit = has && val>=mn*(1-tol) && val<=mx*(1+tol);
      return `<td class="rc ${hit?'hit':'unused'}">${rt(mn,mx)}</td>`;
    }).join('');
    return `<tr${matched?' class="matched"':''}>
      <td>${catB}</td><td><span class="pname">${hl(name,q)}</span>${comB}</td>${tds}
    </tr>`;
  }).join('');

  const summaryLeft = anyInput
    ? `TOTAL <span>${sorted.length}</span> · MATCHED <span style="color:var(--green)">${matchCount}</span>`
    : `TOTAL <span>${sorted.length}</span> PATTERNS`;
  const summaryRight = anyInput && matchCount && !matchOnly
    ? `<span class="hint">✦ 매칭 행이 위로 정렬됩니다</span>` : '';

  el.innerHTML = `
    <div class="summary fade">${summaryLeft}${summaryRight}</div>
    <div class="table-wrap fade">
      <table>
        <thead><tr><th>카테고리</th><th>패턴명</th><th>XB</th><th>AC</th><th>BD</th><th>XD</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); deferredPrompt = e;
  const banner = document.getElementById('installBanner');
  banner.style.display = 'flex';
  document.getElementById('installBtn').addEventListener('click', () => {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => { banner.style.display='none'; deferredPrompt=null; });

});
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js'));
}
